<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>onlineStore</title>
</head>

<body>
    <header>
        <a href="./index.html"> <span class="headerName">
                Mohammad Store <i class="fa-solid fa-store"></i>
            </span></a>
        <span class="headerSell"><a href="#basket" name="basket2">
                <span class="circle">0</span> سبد خرید <i class="fas fa-cart-shopping"></i>
        </span></a>
    </header>
    <hr>
    <div class="searchBox">
        <input type="text" class="search" placeholder="... جست و جوی محصول      ">
    </div>
    <div class="filterContainer">
        <button class="filter">لوازم برقی</button>
        <button class="filter">اکسسوری</button>
        <button class="filter">لباس زنانه</button>
        <button class="filter">لباس مردانه</button>
    </div>
    <hr>
    <div class="products"></div>

    <div class="basket">
        <header>
            <a href="#basket2" name="basket"><span class="headerName">
                    سبد خرید <i class="fas fa-cart-shopping"></i>
                </span></a>
            <span class="headerSell">
                <div class="circle2">آیتم<span class="number">0</span></div>
                <span class="gheimat">قیمت (تومان)</span>
            </span>
        </header>
        <hr>
        <div class="buyedProduct"></div>
        <div class="sooratHesab">
            <p class="p">: مجموع </p>
            <div class="priceContainer">
                <span class="tooman">تومان</span><span class="totalPrice">0</span>
            </div>
        </div>
        <div class="sabtContainer">
            <button class="sabt">
                <i class="fa-regular fa-circle-check"> تسویه حساب</i>
            </button>
        </div>
    </div>

</body>

</html>
